name: Java CI with Maven

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven (Compile & Test)
        run: mvn -B clean package --file Bai3/pom.xml

      - name: Upload Artifact (Lưu file .jar)
        uses: actions/upload-artifact@v3
        with:
          name: my-app-jar
          path: Bai3/target/*.jar